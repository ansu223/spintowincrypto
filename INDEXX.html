<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>صندوق الهدايا | redpacket_box</title>
  <!-- Font Awesome 6 (Free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
    }

    /* fallback font – Tajawal is modern and very popular in Egypt */
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

    body {
      background: linear-gradient(145deg, #1a1f2e 0%, #0d0f17 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #ffffff;
    }

    .card {
      background: rgba(18, 23, 40, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 215, 0, 0.25);
      border-radius: 48px 48px 32px 32px;
      max-width: 420px;
      width: 100%;
      padding: 24px 18px 28px 18px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(240, 185, 11, 0.1) inset;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle glitter / crypto vibe */
    .card::before {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.15), transparent 70%);
      top: -80px;
      right: -80px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 2;
    }

    .gift-icon {
      font-size: 4.8rem;
      filter: drop-shadow(0 8px 12px #f0b90b80);
      animation: subtle-float 3s infinite ease-in-out;
      color: #f3ba2f;
      margin-bottom: 4px;
    }

    @keyframes subtle-float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to left, #f9e2a1, #f3ba2f, #ffd966);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 6px 0;
      line-height: 1.2;
      text-shadow: 0 2px 5px rgba(243, 186, 47, 0.3);
    }

    .subtitle {
      font-size: 1.1rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 16px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      display: inline-block;
      margin: 10px 0 12px 0;
      border: 1px solid rgba(255, 215, 0, 0.25);
      color: #ddd;
    }

    .subtitle i {
      color: #f3ba2f;
      margin: 0 4px;
    }

    .coin-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 80px;
      padding: 8px 16px;
      width: fit-content;
      margin: 16px auto 20px auto;
      border: 1px solid #3a3f55;
    }

    .coin-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 1rem;
    }

    .coin-item i {
      font-size: 1.3rem;
    }

    .btc-color { color: #f3ba2f; }      /* BTTC / gold */
    .usdt-color { color: #26a17b; }    /* USDT green */
    .bnb-color { color: #f3ba2f; }      /* BNB gold */

    .wheel-preview {
      background: #0b0e14;
      border-radius: 50%;
      width: 200px;
      height: 200px;
      margin: 18px auto 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 4px solid rgba(243, 186, 47, 0.5);
      box-shadow: 0 0 30px #f3ba2f40, 0 0 0 2px #ffd966 inset;
    }

    .wheel-preview i {
      font-size: 6rem;
      color: #ffd966;
      filter: drop-shadow(0 0 6px gold);
      position: absolute;
    }

    .wheel-spin-emoji {
      font-size: 5rem;
      z-index: 5;
      animation: spin 12s infinite linear;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .prize-tag {
      background: #232843;
      padding: 12px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 20px;
      font-weight: 500;
      border: 1px dashed #f3ba2f;
    }

    .prize-tag span {
      background: #f3ba2f;
      color: #0d0f17;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .prize-tag i {
      color: #f3ba2f;
      font-size: 1.4rem;
    }

    .cta-button {
      background: linear-gradient(145deg, #f3ba2f, #f9d971);
      border: none;
      border-radius: 80px;
      padding: 22px 28px;
      width: 100%;
      font-size: 1.8rem;
      font-weight: 800;
      color: #0b0e14;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 18px 25px -8px #f3ba2f80, 0 0 0 2px #ffefb0 inset;
      margin: 20px 0 14px 0;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid white;
    }

    .cta-button:active {
      transform: scale(0.97);
      box-shadow: 0 8px 15px #f3ba2f;
    }

    .cta-button i {
      font-size: 2rem;
      color: #1e1a0c;
    }

    .channel-info {
      background: rgba(255, 255, 255, 0.03);
      padding: 14px 16px;
      border-radius: 50px;
      margin: 12px 0 8px 0;
      font-size: 1.1rem;
      border: 1px solid #3f445b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      direction: ltr;
    }

    .channel-info i {
      color: #f3ba2f;
    }

    .channel-info span {
      background: #2a2f44;
      padding: 5px 15px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #ddd;
    }

    .trust-badge {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 20px 0 5px;
      color: #aaa;
      font-size: 0.85rem;
    }

    .trust-badge i {
      color: #f3ba2f;
      margin-left: 4px;
    }

    .footer-note {
      color: #6a6f87;
      font-size: 0.8rem;
      margin-top: 18px;
      border-top: 1px solid #2c3145;
      padding-top: 14px;
    }

    .highlight {
      background: #f3ba2f30;
      border-radius: 40px;
      padding: 2px 14px;
      font-weight: 700;
    }

    /* arabic / egypt friendly */
    .eg-flag {
      display: inline-block;
      margin-left: 6px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- floating gift box icon -->
    <div class="gift-icon">
      <i class="fas fa-gift"></i>
    </div>

    <!-- main headline with egypt vibe -->
    <h1>
      <span class="eg-flag">🇪🇬</span> صندوق الهدايا <span class="eg-flag">🇪🇬</span>
    </h1>
    <div class="subtitle">
      <i class="fas fa-crown"></i> الليلة.. دور العجلة واكسب <i class="fas fa-crown"></i>
    </div>

    <!-- coin strip: bttc - usdt - bnb -->
    <div class="coin-row">
      <div class="coin-item"><i class="fas fa-coins btcc-color" style="color:#f3ba2f;"></i> BTTC</div>
      <div class="coin-item"><i class="fas fa-dollar-sign usdt-color"></i> USDT</div>
      <div class="coin-item"><i class="fab fa-btc bnb-color"></i> BNB</div>
    </div>

    <!-- spin wheel visual (interactive feeling) -->
    <div class="wheel-preview">
      <i class="fas fa-circle-notch fa-spin wheel-spin-emoji" style="font-size: 7rem; color: #f9d971;"></i>
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0b0e14; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #f3ba2f;">
        <i class="fas fa-gift" style="color: #f3ba2f; font-size: 2rem;"></i>
      </div>
    </div>

    <!-- Daily chance highlight -->
    <div class="prize-tag">
      <i class="fas fa-calendar-alt"></i> فرصتك اليومية <span>+500%</span>
      <i class="fas fa-arrow-left"></i>
    </div>

    <!-- main CTA – يخش البوت فوراً -->
    <a href="https://t.me/redpacket_gift_bot/app" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
      <div class="cta-button">
        <i class="fab fa-telegram"></i> ادخل وادير العجلة
        <i class="fas fa-arrow-left"></i>
      </div>
    </a>

    <!-- channel link + bot link clearly -->
    <div class="channel-info">
      <i class="fab fa-telegram-plane"></i> القناة: <span>@redpacket_box</span>
    </div>
    <div style="font-size: 0.95rem; background: #191e30; padding: 8px; border-radius: 40px; margin-bottom: 10px; direction: ltr; display: flex; align-items: center; justify-content: center; gap: 4px;">
      <i class="fas fa-link" style="color:#f3ba2f;"></i> رابط البوت المباشر:
      <span style="background:#2d334b; padding:4px 10px; border-radius: 30px; font-size:0.8rem;">redpacket_gift_bot</span>
    </div>

    <!-- social proof / trust badges (FOMO for egyptians) -->
    <div class="trust-badge">
      <span><i class="fas fa-user-check"></i> +12k user today</span>
      <span><i class="fas fa-bolt"></i>  دفع فوري</span>
      <span><i class="fas fa-star"></i> 4.9 ★</span>
    </div>

    <!-- extra incentive : spinning now -->
    <div style="background: linear-gradient(90deg, transparent, #f3ba2f20, transparent); padding: 8px; border-radius: 40px; margin: 12px 0 4px; font-weight: 500;">
      <i class="fas fa-sync-alt fa-spin"></i> ٧٢ مستخدم يدير العجلة الآن 🇪🇬
    </div>

    <!-- footer note with crypto disclaimer -->
    <div class="footer-note">
      <i class="fas fa-gem" style="color:#f3ba2f;"></i> كل يوم فرصة جديدة تكسب BTTC - USDT - BNB<br>
      اضمن مكسبك دلوقتي
    </div>

    <!-- tiny micro interaction : double arrows -->
    <div style="color: #f3ba2f; margin-top: 5px; font-size: 1rem;">
      <i class="fas fa-angle-double-down"></i> <i class="fas fa-angle-double-down"></i>
    </div>
  </div>

  <!-- Optional: add a simple tracker feel (non functional but looks like activity) -->
  <script>
    (function() {
      // just for fun: simulate active users counter update every few seconds (but static)
      // it's purely cosmetic for Egyptian users trust
      console.log("صندوق الهدايا جاهز للمستخدمين المصريين 💸");
    })();
  </script>
</body>
</html>
